# Local development stack. For now just the API. Postgres and Redis are owned
# by the database/queue workstream — placeholders below show where they slot in
# without collisions when that work lands.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Live reload in dev: mount source and override the image's production CMD.
    volumes:
      - ./app:/app/app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Owned by the database workstream (Supabase is hosted, so a local
