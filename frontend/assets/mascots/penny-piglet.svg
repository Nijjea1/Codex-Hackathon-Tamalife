<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pennyBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffd9bd"/>
      <stop offset="100%" stop-color="#f4a878"/>
    </radialGradient>
    <radialGradient id="pennyEar" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffd9bd"/>
      <stop offset="100%" stop-color="#f0a58f"/>
    </radialGradient>
    <filter id="pennyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#pennyShadow)">
    <!-- ears -->
    <ellipse cx="130" cy="150" rx="26" ry="32" fill="url(#pennyEar)" stroke="#d4836f" stroke-width="3"/>
    <ellipse cx="270" cy="150" rx="26" ry="32" fill="url(#pennyEar)" stroke="#d4836f" stroke-width="3"/>
    <ellipse cx="130" cy="155" rx="13" ry="17" fill="#ffe6d8"/>
    <ellipse cx="270" cy="155" rx="13" ry="17" fill="#ffe6d8"/>

    <!-- body -->
    <ellipse cx="200" cy="230" rx="105" ry="98" fill="url(#pennyBody)" stroke="#d4836f" stroke-width="3.5"/>

    <!-- coin slot -->
    <rect x="182" y="140" width="36" height="8" rx="4" fill="#d4836f"/>
    <rect x="185" y="142" width="30" height="3" rx="1.5" fill="#00000022"/>

    <!-- legs -->
    <ellipse cx="150" cy="315" rx="19" ry="15" fill="url(#pennyBody)" stroke="#d4836f" stroke-width="3"/>
    <ellipse cx="250" cy="315" rx="19" ry="15" fill="url(#pennyBody)" stroke="#d4836f" stroke-width="3"/>

    <!-- little tail -->
    <path d="M 300 250 Q 320 240 315 255 Q 325 260 315 268" fill="none" stroke="#d4836f" stroke-width="4" stroke-linecap="round"/>

    <!-- blush -->
    <ellipse cx="140" cy="255" rx="18" ry="11" fill="#ff9f8f" opacity="0.5"/>
    <ellipse cx="260" cy="255" rx="18" ry="11" fill="#ff9f8f" opacity="0.5"/>

    <!-- snout -->
    <ellipse cx="200" cy="270" rx="44" ry="34" fill="#ffe6d8" stroke="#d4836f" stroke-width="3"/>
    <ellipse cx="184" cy="267" rx="7" ry="9" fill="#d4836f"/>
    <ellipse cx="216" cy="267" rx="7" ry="9" fill="#d4836f"/>

    <!-- eyes -->
    <ellipse cx="160" cy="220" rx="15" ry="18" fill="#2c2416"/>
    <ellipse cx="240" cy="220" rx="15" ry="18" fill="#2c2416"/>
    <circle cx="165" cy="212" r="5.5" fill="#ffffff"/>
    <circle cx="245" cy="212" r="5.5" fill="#ffffff"/>
    <circle cx="156" cy="226" r="2.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="236" cy="226" r="2.5" fill="#ffffff" opacity="0.7"/>

    <!-- eyebrow hint -->
    <path d="M 148 200 Q 160 195 172 200" fill="none" stroke="#d4836f" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M 228 200 Q 240 195 252 200" fill="none" stroke="#d4836f" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- smile -->
    <path d="M 182 288 Q 200 300 218 288" fill="none" stroke="#d4836f" stroke-width="3.5" stroke-linecap="round"/>

    <!-- star mark -->
    <path d="M 200 165 l 4 9 l 10 1 l -7 7 l 2 10 l -9 -5 l -9 5 l 2 -10 l -7 -7 l 10 -1 z" fill="#ffd76a" stroke="#e0a83f" stroke-width="1.5"/>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#5a4636">Penny the piglet</text>
</svg>
