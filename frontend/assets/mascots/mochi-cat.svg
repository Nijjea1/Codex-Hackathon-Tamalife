<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mochiBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f0e4ff"/>
      <stop offset="100%" stop-color="#d9c2f5"/>
    </radialGradient>
    <filter id="mochiShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#mochiShadow)">
    <!-- ears -->
    <path d="M 130 140 L 165 190 L 105 195 Z" fill="url(#mochiBody)" stroke="#b9a0e0" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M 270 140 L 235 190 L 295 195 Z" fill="url(#mochiBody)" stroke="#b9a0e0" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M 138 158 L 158 192 L 120 196 Z" fill="#f7ecff"/>
    <path d="M 262 158 L 242 192 L 280 196 Z" fill="#f7ecff"/>

    <!-- body -->
    <ellipse cx="200" cy="230" rx="105" ry="98" fill="url(#mochiBody)" stroke="#b9a0e0" stroke-width="3.5"/>

    <!-- head pattern patch -->
    <path d="M 260 160 Q 290 175 280 210 Q 260 200 255 175 Z" fill="#c9adf0" opacity="0.6"/>

    <!-- legs -->
    <ellipse cx="150" cy="315" rx="19" ry="15" fill="url(#mochiBody)" stroke="#b9a0e0" stroke-width="3"/>
    <ellipse cx="250" cy="315" rx="19" ry="15" fill="url(#mochiBody)" stroke="#b9a0e0" stroke-width="3"/>

    <!-- tail -->
    <path d="M 295 260 Q 335 250 330 300 Q 328 320 305 315" fill="none" stroke="#b9a0e0" stroke-width="10" stroke-linecap="round"/>

    <!-- blush -->
    <ellipse cx="140" cy="258" rx="18" ry="11" fill="#f0a8c8" opacity="0.55"/>
    <ellipse cx="260" cy="258" rx="18" ry="11" fill="#f0a8c8" opacity="0.55"/>

    <!-- whiskers -->
    <path d="M 115 245 L 65 235 M 115 258 L 63 258 M 115 271 L 65 281" stroke="#b9a0e0" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 285 245 L 335 235 M 285 258 L 337 258 M 285 271 L 335 281" stroke="#b9a0e0" stroke-width="2.5" stroke-linecap="round"/>

    <!-- eyes -->
    <ellipse cx="160" cy="222" rx="15" ry="18" fill="#2c2416"/>
    <ellipse cx="240" cy="222" rx="15" ry="18" fill="#2c2416"/>
    <circle cx="165" cy="214" r="5.5" fill="#ffffff"/>
    <circle cx="245" cy="214" r="5.5" fill="#ffffff"/>
    <circle cx="156" cy="228" r="2.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="236" cy="228" r="2.5" fill="#ffffff" opacity="0.7"/>

    <!-- nose -->
    <path d="M 194 258 L 206 258 L 200 267 Z" fill="#e0a0b8"/>

    <!-- mouth -->
    <path d="M 200 267 Q 190 278 175 273" fill="none" stroke="#b9a0e0" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 200 267 Q 210 278 225 273" fill="none" stroke="#b9a0e0" stroke-width="2.5" stroke-linecap="round"/>

    <!-- star mark -->
    <path d="M 200 165 l 4 9 l 10 1 l -7 7 l 2 10 l -9 -5 l -9 5 l 2 -10 l -7 -7 l 10 -1 z" fill="#ffd76a" stroke="#e0a83f" stroke-width="1.5"/>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#5a4666">Mochi the cat</text>
</svg>
