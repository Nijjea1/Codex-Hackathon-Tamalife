<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="buckyBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#c8ecc8"/>
      <stop offset="100%" stop-color="#93cf9d"/>
    </radialGradient>
    <filter id="buckyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#buckyShadow)">
    <!-- pouch body -->
    <path d="M 110 210 Q 110 320 200 328 Q 290 320 290 210 Q 290 130 200 122 Q 110 130 110 210 Z"
          fill="url(#buckyBody)" stroke="#7cb888" stroke-width="3.5"/>

    <!-- drawstring top -->
    <path d="M 160 122 Q 200 90 240 122" fill="none" stroke="#7cb888" stroke-width="6" stroke-linecap="round"/>
    <circle cx="200" cy="98" r="8" fill="#7cb888"/>
    <path d="M 200 98 L 195 118 M 200 98 L 205 118" stroke="#7cb888" stroke-width="3" stroke-linecap="round"/>

    <!-- fold lines for texture -->
    <path d="M 130 190 Q 140 250 165 300" fill="none" stroke="#7cb888" stroke-width="1.5" opacity="0.4"/>
    <path d="M 270 190 Q 260 250 235 300" fill="none" stroke="#7cb888" stroke-width="1.5" opacity="0.4"/>

    <!-- coin peeking out -->
    <circle cx="240" cy="150" r="22" fill="#ffe066" stroke="#e0a83f" stroke-width="3"/>
    <path d="M 240 138 L 240 162 M 232 143 L 248 143 M 232 157 L 248 157" fill="none" stroke="#e0a83f" stroke-width="2.5" stroke-linecap="round"/>

    <!-- blush -->
    <ellipse cx="150" cy="238" rx="16" ry="10" fill="#f2a8a8" opacity="0.5"/>
    <ellipse cx="250" cy="238" rx="16" ry="10" fill="#f2a8a8" opacity="0.5"/>

    <!-- eyes -->
    <ellipse cx="168" cy="215" rx="14" ry="17" fill="#2c2416"/>
    <ellipse cx="232" cy="215" rx="14" ry="17" fill="#2c2416"/>
    <circle cx="173" cy="207" r="5" fill="#ffffff"/>
    <circle cx="237" cy="207" r="5" fill="#ffffff"/>
    <circle cx="164" cy="220" r="2.2" fill="#ffffff" opacity="0.7"/>
    <circle cx="228" cy="220" r="2.2" fill="#ffffff" opacity="0.7"/>

    <!-- mouth -->
    <path d="M 180 248 Q 200 260 220 248" fill="none" stroke="#7cb888" stroke-width="3.5" stroke-linecap="round"/>

    <!-- stitched dashes -->
    <path d="M 130 280 L 140 280 M 150 280 L 160 280 M 170 280 L 180 280" stroke="#7cb888" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M 220 280 L 230 280 M 240 280 L 250 280 M 260 280 L 270 280" stroke="#7cb888" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#3f5a46">Bucky the coin pouch</text>
</svg>
