<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sunnyBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff2b8"/>
      <stop offset="100%" stop-color="#ffd94d"/>
    </radialGradient>
    <filter id="sunnyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#sunnyShadow)">
    <!-- wings -->
    <ellipse cx="120" cy="245" rx="24" ry="38" fill="url(#sunnyBody)" stroke="#e0a83f" stroke-width="3" transform="rotate(-20 120 245)"/>
    <ellipse cx="280" cy="245" rx="24" ry="38" fill="url(#sunnyBody)" stroke="#e0a83f" stroke-width="3" transform="rotate(20 280 245)"/>

    <!-- body -->
    <ellipse cx="200" cy="230" rx="100" ry="95" fill="url(#sunnyBody)" stroke="#e0a83f" stroke-width="3.5"/>

    <!-- head tuft -->
    <path d="M 190 130 Q 195 105 205 128 Q 212 108 218 132" fill="none" stroke="#e0a83f" stroke-width="4" stroke-linecap="round"/>

    <!-- feet -->
    <path d="M 175 320 L 170 335 M 175 320 L 178 337 M 175 320 L 183 333" stroke="#e8973f" stroke-width="4" stroke-linecap="round"/>
    <path d="M 225 320 L 220 335 M 225 320 L 228 337 M 225 320 L 233 333" stroke="#e8973f" stroke-width="4" stroke-linecap="round"/>

    <!-- blush -->
    <ellipse cx="148" cy="245" rx="16" ry="10" fill="#ff9f6f" opacity="0.5"/>
    <ellipse cx="252" cy="245" rx="16" ry="10" fill="#ff9f6f" opacity="0.5"/>

    <!-- eyes -->
    <ellipse cx="172" cy="210" rx="14" ry="17" fill="#2c2416"/>
    <ellipse cx="228" cy="210" rx="14" ry="17" fill="#2c2416"/>
    <circle cx="177" cy="202" r="5" fill="#ffffff"/>
    <circle cx="233" cy="202" r="5" fill="#ffffff"/>
    <circle cx="168" cy="215" r="2.2" fill="#ffffff" opacity="0.7"/>
    <circle cx="224" cy="215" r="2.2" fill="#ffffff" opacity="0.7"/>

    <!-- beak -->
    <path d="M 188 232 L 212 232 L 200 248 Z" fill="#ff9838" stroke="#e0801f" stroke-width="2"/>
    <path d="M 188 232 L 212 232" stroke="#e0801f" stroke-width="1.5"/>

    <!-- coin badge on chest -->
    <circle cx="200" cy="285" r="16" fill="#ffe066" stroke="#e0a83f" stroke-width="2.5"/>
    <path d="M 200 277 L 200 293 M 195 280 L 205 280 M 195 290 L 205 290" fill="none" stroke="#e0a83f" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#8a6a2e">Sunny the chick</text>
</svg>
