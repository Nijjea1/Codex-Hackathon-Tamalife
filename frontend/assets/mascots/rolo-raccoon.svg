<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="roloBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e8e2da"/>
      <stop offset="100%" stop-color="#c4b8a8"/>
    </radialGradient>
    <filter id="roloShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#roloShadow)">
    <!-- tail (striped, behind body) -->
    <path d="M 300 260 Q 350 240 345 300 Q 342 330 300 335" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 310 265 Q 335 258 335 280" fill="none" stroke="#8a7a68" stroke-width="8" opacity="0.5"/>
    <path d="M 305 300 Q 332 296 333 315" fill="none" stroke="#8a7a68" stroke-width="8" opacity="0.5"/>

    <!-- ears -->
    <ellipse cx="140" cy="145" rx="24" ry="28" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3.5"/>
    <ellipse cx="260" cy="145" rx="24" ry="28" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3.5"/>
    <ellipse cx="140" cy="150" rx="11" ry="14" fill="#3a332c"/>
    <ellipse cx="260" cy="150" rx="11" ry="14" fill="#3a332c"/>

    <!-- body -->
    <ellipse cx="200" cy="230" rx="105" ry="98" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3.5"/>

    <!-- legs -->
    <ellipse cx="150" cy="315" rx="19" ry="15" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3"/>
    <ellipse cx="250" cy="315" rx="19" ry="15" fill="url(#roloBody)" stroke="#8a7a68" stroke-width="3"/>

    <!-- mask marking -->
    <path d="M 145 195 Q 200 175 255 195 Q 250 235 200 240 Q 150 235 145 195 Z" fill="#5a4d40" opacity="0.85"/>

    <!-- blush under mask -->
    <ellipse cx="145" cy="255" rx="16" ry="10" fill="#e0a8a8" opacity="0.5"/>
    <ellipse cx="255" cy="255" rx="16" ry="10" fill="#e0a8a8" opacity="0.5"/>

    <!-- eyes (on mask) -->
    <ellipse cx="168" cy="210" rx="13" ry="16" fill="#ffffff"/>
    <ellipse cx="232" cy="210" rx="13" ry="16" fill="#ffffff"/>
    <circle cx="170" cy="213" r="8" fill="#2c2416"/>
    <circle cx="234" cy="213" r="8" fill="#2c2416"/>
    <circle cx="173" cy="209" r="3" fill="#ffffff"/>
    <circle cx="237" cy="209" r="3" fill="#ffffff"/>

    <!-- nose -->
    <ellipse cx="200" cy="255" rx="9" ry="7" fill="#3a332c"/>

    <!-- mouth -->
    <path d="M 185 268 Q 200 278 215 268" fill="none" stroke="#8a7a68" stroke-width="3" stroke-linecap="round"/>

    <!-- coin held in paws -->
    <circle cx="200" cy="298" r="18" fill="#ffe066" stroke="#e0a83f" stroke-width="2.5"/>
    <path d="M 200 289 L 200 307 M 194 292 L 206 292 M 194 304 L 206 304" fill="none" stroke="#e0a83f" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#5a4d40">Rolo the raccoon</text>
</svg>
