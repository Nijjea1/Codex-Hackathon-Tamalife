<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="twinkleBody" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#ffd766"/>
    </radialGradient>
    <filter id="twinkleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <ellipse cx="200" cy="345" rx="95" ry="14" fill="#00000014"/>

  <g filter="url(#twinkleShadow)">
    <path d="M 200 110 L 226 185 L 305 190 L 240 235 L 262 312 L 200 268 L 138 312 L 160 235 L 95 190 L 174 185 Z"
          fill="url(#twinkleBody)" stroke="#e0a83f" stroke-width="3.5" stroke-linejoin="round"/>

    <!-- inner shine -->
    <path d="M 200 140 L 215 190 L 200 175 L 185 190 Z" fill="#ffffff" opacity="0.5"/>

    <!-- blush -->
    <ellipse cx="150" cy="240" rx="16" ry="10" fill="#ffb877" opacity="0.55"/>
    <ellipse cx="250" cy="240" rx="16" ry="10" fill="#ffb877" opacity="0.55"/>

    <!-- eyes -->
    <ellipse cx="172" cy="220" rx="14" ry="17" fill="#2c2416"/>
    <ellipse cx="228" cy="220" rx="14" ry="17" fill="#2c2416"/>
    <circle cx="177" cy="212" r="5" fill="#ffffff"/>
    <circle cx="233" cy="212" r="5" fill="#ffffff"/>
    <circle cx="168" cy="225" r="2.2" fill="#ffffff" opacity="0.7"/>
    <circle cx="224" cy="225" r="2.2" fill="#ffffff" opacity="0.7"/>

    <!-- mouth -->
    <path d="M 184 252 Q 200 264 216 252" fill="none" stroke="#e0a83f" stroke-width="3.5" stroke-linecap="round"/>

    <!-- tiny sparkles around -->
    <g fill="#ffd76a">
      <path d="M 70 150 l 3 8 l 8 1 l -6 6 l 1 8 l -6 -4 l -6 4 l 1 -8 l -6 -6 l 8 -1 z"/>
      <path d="M 330 160 l 2 6 l 6 1 l -5 4 l 1 6 l -4 -3 l -4 3 l 1 -6 l -5 -4 l 6 -1 z"/>
      <circle cx="90" cy="280" r="4"/>
      <circle cx="315" cy="270" r="4"/>
    </g>
  </g>

  <text x="200" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#5a4636">Twinkle the star</text>
</svg>
